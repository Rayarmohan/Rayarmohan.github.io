<!DOCTYPE html>
<html>
<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="gradient_mouse">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>gradient_mouse</title>
  <link rel="manifest" href="manifest.json">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #000;
      overflow: hidden;
    }

    /* ── Splash wrapper ───────────────────────────── */
    #flutter-loading {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      opacity: 1;
      transition: opacity 0.55s ease;
    }

    /* ── Dot-grid background ──────────────────────── */
    #flutter-loading::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.055) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* ── Center stage ─────────────────────────────── */
    .stage {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 320px;
      height: 320px;
    }

    /* ── Pulse rings ──────────────────────────────── */
    .ring {
      position: absolute;
      border-radius: 50%;
      border: 1.5px solid;
      width: 0;
      height: 0;
      opacity: 0;
      animation: ringPulse 2.4s ease-out infinite;
      /* keep centred regardless of size */
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    .ring-1 { border-color: rgba(101,128,3,0.9);  animation-delay: 0s;     animation-duration: 2.4s; }
    .ring-2 { border-color: rgba(6,20,141,0.9);   animation-delay: 0.6s;   animation-duration: 2.4s; }
    .ring-3 { border-color: rgba(7,145,18,0.9);   animation-delay: 0.3s;   animation-duration: 2.4s; }

    @keyframes ringPulse {
      0%   { width: 20px;  height: 20px;  opacity: 0.9; }
      100% { width: 280px; height: 280px; opacity: 0;   }
    }

    /* ── Rotating arc ─────────────────────────────── */
    .arc-wrapper {
      position: absolute;
      width: 120px;
      height: 120px;
      animation: arcSpin 1.8s linear infinite;
    }
    @keyframes arcSpin {
      to { transform: rotate(360deg); }
    }

    .arc-svg {
      width: 100%;
      height: 100%;
    }

    /* ── Center glowing dot ───────────────────────── */
    .center-dot {
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fff;
      box-shadow:
        0 0 10px 4px rgba(255,255,255,0.75),
        0 0 28px 8px rgba(101,128,3,0.55),
        0 0 50px 14px rgba(7,145,18,0.25);
      animation: dotPop 0.55s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes dotPop {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    /* ── Text block ───────────────────────────────── */
    .splash-text {
      position: absolute;
      top: calc(50% + 90px);
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      white-space: nowrap;
      animation: textReveal 0.7s cubic-bezier(0.22,1,0.36,1) 0.45s both;
    }
    @keyframes textReveal {
      from { opacity: 0; transform: translateX(-50%) translateY(22px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0);    }
    }

    .splash-name {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 19px;
      font-weight: 800;
      letter-spacing: 7px;
      background: linear-gradient(90deg, #a3b800, #ffffff 50%, #09c41a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .splash-role {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 11px;
      color: #666;
      letter-spacing: 4px;
      margin-top: 8px;
      font-weight: 300;
    }

    /* ── Loading bar ──────────────────────────────── */
    .bar-track {
      width: 160px;
      height: 2px;
      background: rgba(255,255,255,0.07);
      border-radius: 2px;
      margin: 18px auto 0;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      width: 0%;
      border-radius: 2px;
      background: linear-gradient(90deg, #658003, #079112);
      box-shadow: 0 0 8px rgba(7,145,18,0.6);
      animation: barLoad 2.5s cubic-bezier(0.4,0,0.2,1) 0.45s forwards;
    }
    @keyframes barLoad {
      0%   { width: 0%;   }
      60%  { width: 75%;  }
      100% { width: 100%; }
    }
  </style>
</head>

<body>
  <!-- ── Custom splash (shows instantly, before Flutter boots) ── -->
  <div id="flutter-loading">
    <div class="stage">
      <!-- Pulse rings -->
      <div class="ring ring-1"></div>
      <div class="ring ring-2"></div>
      <div class="ring ring-3"></div>

      <!-- Rotating arc (inline SVG for crisp rendering) -->
      <div class="arc-wrapper">
        <svg class="arc-svg" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- arc 1 — olive green, ~220° -->
          <path d="M60 4 A56 56 0 1 1 9.6 78" stroke="#658003" stroke-width="2.5" stroke-linecap="round"/>
          <!-- arc 2 — dark blue, ~90° -->
          <path d="M14 88 A56 56 0 0 1 52 4.3" stroke="#06148D" stroke-width="2.5" stroke-linecap="round"/>
          <!-- arc 3 — green accent, ~50° -->
          <path d="M108 76 A56 56 0 0 1 94 106" stroke="#079112" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>

      <!-- Glowing center dot -->
      <div class="center-dot"></div>
    </div>

    <!-- Text sits outside .stage so it doesn't clip -->
    <div class="splash-text">
      <div class="splash-name">RAYAR MOHAN</div>
      <div class="splash-role">Mobile App Developer</div>
      <div class="bar-track">
        <div class="bar-fill"></div>
      </div>
    </div>
  </div>

  <!-- ── Flutter bootstrap ───────────────────────────────────── -->
  <script src="flutter_bootstrap.js" async></script>

  <script>
    // Fade out the HTML splash the moment Flutter renders its first frame
    window.addEventListener('flutter-first-frame', function () {
      const el = document.getElementById('flutter-loading');
      if (!el) return;
      el.style.opacity = '0';
      setTimeout(function () {
        el.style.display = 'none';
      }, 580); // matches the 0.55s CSS transition + small buffer
    });
  </script>
</body>
</html>
